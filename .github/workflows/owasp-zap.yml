name: OWASP ZAP Baseline Scan

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * 0' # Every Sunday at 2am

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Scan the webapp
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://4.187.201.88'
          # Removed rules_file_name since the file does not exist

